<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="This is a Contact page with a form to send a message to the company">
    <meta name="author" content="Matias de la Rosa">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="container">
            <img src="images/z-wwr-blue.jpg" alt="logo">
            <nav>
                <ul class="menu-link">
                    <li class="boton"><a class="nav-links" href="index.html">Home</a></li>
                    <li class="boton"><a class="nav-links" href="about.html">About Us</a></li>
                    <li class="boton"><a class="nav-links" href="trips.html">Trips</a></li>
                    <li class="boton"><a class="nav-links" href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>

    </header>
    <main>
        <div class="hero">
            <img src="images/hero_transparency_1024.jpg" alt="hero-image">
            <h1>White Water Rafting</h1>
            <div class="map-form">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d168769.304437483!2d-64.34914285112777!3d-31.366152001874323!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sar!4v1774836800401!5m2!1sen!2sar"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                <form action="submit">
                    <div class="form-item column2">
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="form-item column2">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail" required>
                    </div>
                    <div class="radio-group-container">
                        <span class="group-title">Message Purpose:</span>

                        <div class="radio-options">
                            <label>
                                <input type="radio" name="priority" value="general"> General Inquiry
                            </label>

                            <label>
                                <input type="radio" name="priority" value="reservation"> Reservation
                                Question
                            </label>

                            <label>
                                <input type="radio" name="priority" value="website"> Website
                                Suggestion
                            </label>
                        </div>
                    </div>

            </div>
            </form>
        </div>

        </div>


    </main>
    <footer>
        <p>&copy; 2026 | White Water Rafting | Matias de la Rosa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img class="svg-social" src="images/facebook-square.svg" alt="facebook-logo">
            </a>
            <a href="https://instagram.com">
                <img class="svg-social" src="images/instagram-square.svg" alt="instagram-logo">
            </a>
            <a href="https://linkedin.com">
                <img class="svg-social" src="images/linkedin-square.svg" alt="linkedin-logo">
            </a>
        </nav>

    </footer>

</body>

</html>
